  <script id="writing-post-data" type="application/json">{"slug":"19-things-that-feel-true-enough-to-keep","title":"19 Things That Feel True Enough to Keep","subtitle":"I turn 19 today. Here are 19 things the last few years taught me.","date":"Jun 21, 2026","dateISO":"2026-06-21","substackUrl":"https://substack.com/home/post/p-202945995","intro":["I turn 19 today.","I'm wary of anyone my age who acts like they have life figured out, so I won't pretend to. But I've been paying attention. A few things have started to feel true enough to keep. Nineteen of them, one for each year. Some I learned the hard way. Most I picked up from watching people I admire. Ask me again at 29 and I might cross half of these out. For now, here they are."],"sections":[{"number":1,"title":"Go positive, and go first.","body":"Most people are too shy or too scared to make the first move, which means the move is usually sitting there for the taking. Your dream job, your dream investor, your dream life, all of it might be one conversation away from where you're standing right now. Think about an elevator. Two people, thirty silent seconds, both pretending to read something urgent on their phones. We dodge the hello even though the other person is almost always glad to have one. Worst case, a few seconds of mild awkwardness. Best case, a connection that changes your year. Those odds are not close. Go first."},{"number":2,"title":"Live with something to add, not something to prove.","body":"Do the work because you love it, and because it gives you a chance to help someone along the way. The person who shows up to prove they belong is exhausting to be around. The person who shows up to add something is the one people actually want in the room. Aim to be the second one, and a good life tends to show up behind it, almost as a side effect."},{"number":3,"title":"Everything runs on its own clock.","body":"Some people find their thing at 18. Others find it at 45. Both lives can be just as full, and the one who got there later did not lose. We forget this because feeds only ever show arrivals, never the long quiet stretches in between. Do not let someone else's timeline set yours. What matters is not when you arrive. It is whether you were actually living on the way there."},{"number":4,"title":"Me is a disease.","body":"The obsession with \"me\" sits at the root of a surprising amount of misery. Stop thinking about yourself quite so much, and stop taking yourself so seriously. Here is the freeing part: most people barely remember what they had for lunch yesterday, let alone the thing you said that you've been replaying in your head for a week. Nobody is watching you as closely as you fear they are. Once you really feel that, life gets a lot lighter."},{"number":5,"title":"You slowly become the people you spend time with.","body":"You can feel this one if you watch for it. Sit with ambitious, kind, curious people long enough and you start reaching higher without ever deciding to. Sit with cynics and you start shrinking the same way. Willpower is weak next to environment. Choose your rooms with care, because over time the room ends up choosing you back."},{"number":6,"title":"Do the hard thing while it's still small.","body":"The awkward conversation, the apology, the bug you keep scrolling past, the email you don't want to send. None of it shrinks while you wait. It compounds, in the wrong direction. A plate is easy to wash tonight and a science project by Sunday. Whatever you're avoiding is at its smallest version today. Handle it today."},{"number":7,"title":"Drop the comparison.","body":"Comparison is rigged from the start, because you're matching your inside against everyone else's outside. You know all of your own doubt and none of theirs, and there is always someone further along to feel behind. It does not end and it does not satisfy. The only scoreboard worth checking is the one with you on it a year ago."},{"number":8,"title":"Money is not the only thing that compounds.","body":"Trust compounds. Relationships compound. Confidence, skill, reputation, friendship, all of it stacks the same way money does. The deposits look almost too small to matter on any given day. One kept promise. One push-up. One more honest conversation. Boring on a Tuesday, enormous over a decade. Just keep showing up."},{"number":9,"title":"Life has seven slices.","body":"Health, family, friends, career, community, spirituality, hobbies. Starve six of them to feed one, and the starved ones do not politely wait around for you. They rot. And what rots usually does not grow back later, once you've finally decided you're \"successful enough\" to come back to it. Later is far more expensive than it looks. Tend to all seven now."},{"number":10,"title":"Satisfaction is a fraction.","body":"It is not simply your dreams plus your accomplishments. It is your dreams plus your accomplishments, divided by your regret. Almost everyone spends their whole life trying to grow the top of that fraction, chasing more wins, more proof, more progress. But the bottom is the number nobody manages, and the bottom quietly divides everything sitting above it. So collecting fewer regrets matters every bit as much as stacking more wins. Do the things you'll wish you had done. Skip the things you'll wish you hadn't. The math takes care of itself."},{"number":11,"title":"Smart people know when to act stupid.","body":"The sharpest people do not need to win every exchange. They feel the same urge you do to correct someone, to show what they know, and they just let it pass. They step back, keep it simple, and let the other person feel respected and right. Restraint reads as confidence. Knowing exactly when to play a little dumb is one of the smartest moves there is."},{"number":12,"title":"Getting rich is really about freedom.","body":"Not the luxury, not the status, not the showing off. The actual prize is the freedom to stop forcing yourself to get along with people, places, and situations that drain you. Money buys you the option to walk away without needing anyone's permission. That is the whole point. Everything else is just decoration."},{"number":13,"title":"Reputation is built in years and spent in an afternoon.","body":"People do not really remember what you said. They remember how you acted when doing the right thing actually cost you something. You are writing that record right now, on purpose or not, in every small choice nobody seems to be watching. Be the person whose word does not need a contract sitting behind it."},{"number":14,"title":"Curiosity is the common thread.","body":"It is the one trait I have found in every successful person I've met so far. They disagree on nearly everything else. Some swear it was luck, some swear it was the work, some have a worldview I can barely follow. But every single one of them told me the same thing: stay curious. The most interested person in the room has a habit of becoming the most interesting one, and tends to do pretty well too."},{"number":15,"title":"Build your health like it's the base of everything, because it is.","body":"On a normal day you feel like you have a million problems. The day your health breaks, you find out you only ever had one. Treat your body like a temple, and I mean that literally. Build it strong enough that life has a hard time knocking you over. The other six slices all sit on top of this one."},{"number":16,"title":"Happiness is a skill, and a choice.","body":"Things can buy you comfort, but they rarely buy lasting happiness. Wanting something feels great for a moment and then immediately asks for the next thing, and running that loop forever is a quiet way to stay miserable. Real happiness tends to come from the inside out. From gratitude. From being where your feet are. From the people around you, and from giving yourself to something bigger than your own wants. It is a practice, not a purchase. You get better at it the same way you get better at anything."},{"number":17,"title":"Action creates information.","body":"You cannot think your way to clarity. You act your way there. Publish the thing. Launch the site. Start the business. Do it today, because life is shorter than we let ourselves believe. The path almost never reveals itself from the chair. It shows up step by step, but only once you start walking. Move first, figure out the rest on the way."},{"number":18,"title":"Time is the one thing you cannot earn back.","body":"You can rebuild money. You can repair a reputation. You can sometimes even claw your health back from the edge. You cannot get back a single hour. It is the only currency that flows in one direction, and we spend it like it's endless precisely because we'd rather not sit with that fact. Treat your time like it's scarce, because it is, and pay attention to who and what you keep choosing to spend it on."},{"number":19,"title":"Ask them out.","body":"Even if the answer is no, you walk away with the quiet peace of having been honest instead of the slow weight of always wondering. Do not be afraid to tell people you love them, said with respect, with timing, and without forcing it on anyone. That person you've already decided is out of your league might just turn out to be your forever. But you will never know unless you ask. Carry fewer unasked questions. It is one of the lightest ways to live."}],"outro":["That's nineteen. None of it is settled, and I'd be a little suspicious of myself if it were. These are just the things that feel true enough to keep carrying for now. If even one of them is useful to you, that's reason enough to have written it down.","Here's to figuring out the next one."]}</script>
