  <script id="writing-post-data" type="application/json">{"slug":"everywhere-except-the-income-statement","title":"Everywhere Except the Income Statement","subtitle":"Companies are spending tens of billions buying AI. I went looking for the productivity in the financials. Here is what the receipts actually say.","date":"Jun 22, 2026","dateISO":"2026-06-22","substackUrl":"https://substack.com/home/post/p-203063844","intro":["There is a line that economists keep dusting off this year. Back in 1987, Robert Solow looked at the computer revolution and said you could see the computer age everywhere except in the productivity statistics. Apollo’s chief economist, Torsten Slok, updated it for our moment: AI is everywhere except in the incoming macroeconomic data.","That is the puzzle I wanted to sit with. Not the model labs, not the chip makers, not the question of whether GPT-5 or Claude is smarter. Those companies are selling shovels, and the shovel sellers always do well in a gold rush. The more interesting question is about the people buying the shovels. Investment banks, payment companies, ride-hailing platforms, software firms. They are writing real checks to OpenAI, Anthropic, Google, and a long tail of application vendors. So: is that money coming back as productivity? Is it showing up as lower costs, fatter margins, fewer people doing more work? Or is most of it a very expensive way to let engineers vibe-code prototypes and burn through API credits until the budget runs out?","I went through earnings calls, SEC filings, and the better research reports to find out. The short version is that the truth sits in an uncomfortable middle, and the middle is more useful than either of the cartoons people argue about online."],"sections":[{"title":"The hypothesis","paragraphs":["Let me state it plainly so it can be tested.","If AI is a real productivity technology rather than a status symbol, then companies that buy and deploy it at scale should show one of two things in their financials. Either their costs fall for a given level of output, especially in labor-heavy functions like customer support and software development, or their revenue grows without a matching rise in headcount and operating expense. In accounting terms, you would expect to see it in operating leverage and margin expansion, not just in glossy press releases.","The null hypothesis is the boring one, and you should always respect the boring one. It says that AI spend is mostly experimentation, that the gains are real at the level of individual tasks but get eaten by integration costs, rework, and organizational friction before they reach the income statement, and that the aggregate effect on profit is close to noise.","Two distinctions matter before we look at the evidence. The first is between buyers and builders. A model lab making money selling tokens tells you nothing about whether a bank makes money using them. The second is between productivity and profit. Productivity is doing the same work with fewer inputs. Profit is what is left after everyone takes their cut, including the cloud bill. AI can raise the first and leave the second flat, because the savings get competed away or reinvested. Keep both in view."]},{"title":"Part one: the money going out","paragraphs":["The spend is not in doubt. That part is easy to establish.","Menlo Ventures, which runs an annual survey of enterprise AI, put total enterprise AI spend at roughly 37 billion dollars in 2025, up from 1.7 billion in 2023. Inside that, spending by individual departments hit 7.3 billion, more than four times the prior year. The single largest category was not marketing or customer service. It was coding, at 4 billion dollars, which is 55 percent of all departmental AI spend. Half of developers now reach for an AI coding tool every day.","That detail is worth holding onto, because it is the crux of the cynic’s case. The biggest line item in the enterprise AI budget is software engineers using assistants to write code faster. Whether that translates into shipped products and lower costs, or just more code of uncertain value, is exactly the thing in question.","Two other shifts stand out from the same data. Companies have stopped trying to build their own models and started buying. In 2024 the split was roughly even, 53 percent purchased versus 47 percent built in-house. By 2025, about three-quarters of AI use cases were bought rather than built. And the spend is concentrated in knowledge-heavy industries. Oxford Economics found that finance, IT, and professional services each crossed 40 billion dollars in AI spend in 2025, and projects total US AI-related outlays climbing toward 1.75 trillion by 2030.","Sitting underneath all of this is the capital expenditure of the hyperscalers, the data center buildout that makes the tokens cheap enough to use. Big Tech capex roughly doubled in two years to about 427 billion dollars in 2025, with 2026 projections running anywhere from 562 billion to north of 650 billion depending on who is counting. J.P. Morgan ran the arithmetic on what that infrastructure needs to earn back and arrived at a sobering figure: roughly 650 billion dollars of annual revenue, in perpetuity, just to clear a 10 percent return on the money already committed. That is the bill the productivity has to eventually pay.","So the inputs are enormous and growing. Now the outputs."]},{"title":"Part two: the receipts, company by company","paragraphs":["This is where it gets concrete. I picked four cases because each tells you something different, and together they cover the range from honest win to honest mess."],"subsections":[{"title":"Klarna, and the most quoted number in the business","paragraphs":["If you have heard one corporate AI story, it is probably this one. In February 2024 the buy-now-pay-later company Klarna launched a customer service assistant built on OpenAI’s models. In its first month it handled 2.3 million conversations, two-thirds of the company’s total chat volume. Klarna said the assistant was doing the equivalent work of 700 full-time agents, resolved issues in under two minutes versus eleven for a human, and would add about 40 million dollars to profit in 2024. The implementation reportedly cost two to three million. As a return on investment, that is hard to argue with.","The number kept climbing. By the third quarter of 2025, CEO Sebastian Siemiatkowski told investors the assistant was doing the work of 853 agents and had saved the company 60 million dollars. Cost per customer service transaction fell from 32 cents in early 2023 to 19 cents in early 2025, a 40 percent drop. Customer satisfaction held steady, and the company’s net promoter score sat at a healthy 73.","Now the part that gets left out of the LinkedIn posts, and the part that actually matters for our hypothesis.","First, the headcount claim was always softer than it sounded. Klarna did not fire 700 agents. It froze hiring and shrank through attrition during a growth phase, cutting total staff from roughly 5,000 in late 2023 to about 3,500 a year later. The “700 agents” figure was the hiring it avoided, not the people it removed. Some of the workforce reduction was AI. Some was ordinary cost discipline after a brutal down-round. Pinning all of it on the chatbot overstates the case, and to his credit Siemiatkowski has more or less said so.","Second, and this is the line I keep coming back to, the savings did not actually lower Klarna’s customer service costs in absolute terms. In the third quarter of 2025, customer service and operations cost the company 50 million dollars, up from 42 million a year earlier, even with the 60 million in claimed AI savings sitting right there. How? Because revenue grew 26 percent and users grew 32 percent. The business got much bigger, so the total cost line went up even as the cost per transaction went down. This is the real shape of the win. AI did not cut Klarna’s support costs. It let support costs grow much slower than the business, which is operating leverage, which is genuinely valuable, and which is a completely different sentence from “AI replaced our workers.”","Third, Klarna walked back the all-in strategy. In May 2025 the company started rehiring human agents for complex and premium cases, moving to what Siemiatkowski called an “Uber-type” model where a person is always available. His own framing was blunt: cost-driven automation produces lower quality, and investing in human support is the wiser path for the cases that matter most. The lesson there is not that the AI failed. It is that the boundary between what AI handles and what humans handle is a design decision, and Klarna drew it too aggressively the first time.","Klarna is the best case for AI productivity in this whole essay, and even Klarna is messier than the headline."]},{"title":"Salesforce, and the boldest claim on record","paragraphs":["Marc Benioff has made the most quotable executive statements about AI replacing labor, and Salesforce sells AI for a living, so it is the natural next case.","On a podcast in late 2025, Benioff said he had cut his customer support headcount from about 9,000 to roughly 5,000, a reduction of around 4,000 roles, because, in his words, he needs “less heads.” He said AI agents now handle about half of Salesforce’s support interactions, that the company’s Agentforce product fields more than a million customer conversations, and that support costs were down 17 percent since the start of 2025. For a company telling its own customers to buy AI agents, this is the proof-of-concept they want to point to.","Two things complicate the clean story.","The company’s own clarification was that this was a rebalancing, not a layoff. Salesforce said it stopped backfilling support engineer roles because case volume fell, and redeployed hundreds of employees into sales, professional services, and customer success. So the people did not all leave the company. They moved to functions that generate revenue. That is still a productivity gain, but it is the avoided-hiring, redeployment kind, the same pattern as Klarna, not a straight cost deletion.","And then the reliability wall. By late 2025, reporting surfaced that Salesforce had run into hard limits deploying large language models in production. Models would start dropping instructions when given more than about eight at once. A home security customer using Agentforce for 2.5 million customers hit exactly these problems. Salesforce’s own spokesperson put it about as honestly as a vendor can: large language models are amazing, but they cannot run your business by themselves, and you have to wrap them in data, business logic, and guardrails to get predictable outcomes. That is true, and it is also a quiet admission that the autonomous-agent dream is further off than the keynote suggested.","Here is the financial check that nobody puts next to the Benioff quote. For its fiscal 2025, the year ending in early 2025, Salesforce reported revenue of 37.9 billion dollars, up 9 percent. That is solid, but it is single-digit growth, roughly in line with the years before the AI push. Operating margin and cash flow improved nicely, with free cash flow up 31 percent, which is consistent with a company squeezing efficiency out of its operations. But you do not see AI showing up as a revenue explosion. You see it, at most, as margin discipline. The agent revolution that is supposed to reprice the entire software industry has not yet shown up in Salesforce’s own top line."]},{"title":"The investment banks, where the labor is the product","paragraphs":["Banks are the most interesting case, because in a bank the expensive input is human judgment, and that is exactly what these tools claim to augment. The numbers the banks publish are large.","JPMorgan, which spends more on technology than any other bank, estimates its AI initiatives have generated roughly 1.5 billion dollars in value across fraud prevention, trading, and operational efficiency, and says its internal coding assistant lifted developer productivity by 10 to 20 percent across tens of thousands of engineers. Jamie Dimon has compared AI to the printing press, the steam engine, and electricity, which is the kind of thing a CEO says, but he is also putting the budget behind it.","Goldman Sachs rolled out its GS AI Assistant to the whole firm in mid-2025 after piloting it with about 10,000 employees, and reports roughly 20 percent developer productivity gains, up to 30 percent on specific tasks. Its CTO is deploying autonomous coding agents to work alongside the bank’s roughly 12,000 human developers, projecting three to four times the productivity of earlier tools. David Solomon offered the most vivid claim of all: AI can now draft 95 percent of an IPO prospectus in minutes, work that used to take a six-person team two weeks. His phrase was that the last 5 percent now matters more because the rest has become a commodity.","Morgan Stanley gave its 16,000-plus financial advisors a GPT-4 assistant that searches 100,000-plus internal research documents, and says it saves advisors 10 to 15 hours a week, with measured productivity up about 11.5 percent after a year. Bank of America’s assistant Erica has now handled more than 3.2 billion client interactions, and the bank says more than 90 percent of its 213,000 employees use AI tools.","These are real, specific, and large numbers. So why am I not convinced the banks prove the bull case?","Because the labor cost has not gone down. The banks are not reporting that AI let them shrink their workforces. They are reporting that AI lets each employee produce more, and they are spending more on technology, not less, to get there. Goldman folds its AI work into more than 15 billion dollars of annual operating and technology spend. Bank of America runs roughly 13 billion in annual tech spend with another 4 billion in new technology investment planned for 2026. The story the banks are actually telling is capacity expansion, more research notes, more code, more client interactions per head, financed by a rising tech budget. That can be enormously valuable over time. It is also not the same as “AI cut our costs,” and it will take years of margin data to know whether the extra capacity converts into extra profit or just gets competed away as every bank buys the same tools."]},{"title":"Uber, where the financial statements do the talking","paragraphs":["I saved Uber for last because Uber gives us something the others do not: clean numbers from SEC filings rather than a CEO on a podcast. And Uber explicitly told investors it expanded AI in customer service, giving its support agents automatic summaries of customer issues, suggested resolution steps, and drafted replies.","So here is the test, straight from the filings. Between 2023 and 2025, Uber’s revenue grew from 37.3 billion dollars to 52.0 billion, an increase of about 39 percent. Over the same two years, its operations and support expense went from 2,689 million to 2,854 million. That is a rise of roughly 6 percent. Read those two numbers together. The business grew almost 40 percent while the cost line most exposed to customer support grew about 6 percent. Operations and support fell from 1.7 percent of gross bookings to 1.4 percent in a single year, which Uber attributed to improved fixed cost leverage.","That is the cleanest fingerprint of an AI productivity gain I found anywhere. Not a press release, not a headcount claim, just a cost line that stayed nearly flat while volume surged. If you want a single chart that argues AI is doing something real, it is Uber’s operations-and-support line plotted against revenue.","One honest caveat, because the bull case loves to abuse this kind of number. Uber’s operating income also exploded in this period, from 1.1 billion to 5.6 billion dollars, and almost none of that is AI. It is the company hitting profitable scale, lapping insurance costs, and a dozen other things. Do not credit AI for the bottom line. Credit it, plausibly, for the specific cost line where the company says it deployed AI and where the leverage is visible. That is the disciplined way to read these statements."]},{"title":"The receipts, side by side","paragraphs":["Lined up against each other, the four cases rhyme. In each one the headline sounds like replacement, and the financials describe something quieter."]}],"list":["Klarna bought an OpenAI customer service assistant and says it does the work of 853 agents for about 60 million in savings. The reality is that cost per transaction fell 40 percent, but total support cost still rose as the business grew, and the company rehired humans for complex cases.","Salesforce deployed its own Agentforce agents and Benioff says he cut support headcount from 9,000 to 5,000. The reality is that most of those people were redeployed into revenue roles, support cost fell about 17 percent, revenue growth stayed single digit, and the product hit real reliability limits.","JPMorgan, Goldman, and Morgan Stanley bought OpenAI-based assistants and coding agents and report 10 to 30 percent productivity gains, with JPMorgan claiming 1.5 billion in value. The reality is that output per employee is up, but tech budgets are rising rather than falling and none of them report headcount cuts.","Uber expanded AI in customer support, in its own words “significantly.” The reality is the cleanest of the set: revenue up about 39 percent over two years while operations and support cost rose only about 6 percent."]},{"title":"Part three: why it isn’t in the macro data","paragraphs":["Now zoom out from individual companies to the whole economy, because this is where the bull case runs into a wall.","The most cited skeptical document of the year is the NANDA report, “The GenAI Divide: State of AI in Business 2025.” It gets shorthanded as “the MIT report” everywhere, and I want to correct that here: it was not written by MIT faculty, but by researchers at NANDA, one of MIT’s affiliate labs, and the paper has been largely discredited since its release. Its headline finding is still worth stating, with that caveat attached: of organizations deploying generative AI, about 95 percent saw no measurable impact on profit and loss, while only 5 percent extracted real value. This was against 30 to 40 billion dollars of enterprise spend. The report is not bulletproof. It is based on a relatively small set of interviews and public deployments, it is preliminary, and serious people have argued it is an outlier compared with larger surveys that find more positive signals. Take the exact 95 percent with salt, and take the MIT label off it entirely. But the shape of it is worth taking seriously, because it lines up with a lot of other evidence.","The NANDA report also contains the single most useful finding in this entire debate, and it maps directly onto what we saw company by company. Buying AI tools from specialized vendors succeeded about 67 percent of the time. Building your own internal tool succeeded roughly a third as often. The companies that won bought narrow, well-integrated tools and pointed them at a specific workflow. The companies that failed tried to build general platforms in-house and got stuck. That is the buy-versus-build divide, and it is most of the difference between the 5 percent and the 95 percent.","The macro evidence keeps pointing the same way. An NBER working paper by Ivan Yotzov and Jose Maria Barrero found that 89 percent of managers reported no change in productivity, measured as sales per employee, over the prior three years, even as AI adoption among firms rose from 61 to 71 percent. A PwC survey found only 30 percent of CEOs reported any revenue increase from AI, while 22 percent said their costs actually went up. The UK government ran a controlled trial of Microsoft Copilot inside its Department for Business and Trade, 1,000 licenses over three months, and concluded that while people wrote emails faster and produced better summaries, the evaluation did not find evidence that the time savings translated into improved productivity. The hours were saved. They just leaked away somewhere before they became output.","The economists are split on what it adds up to. Daron Acemoglu, a Nobel laureate at MIT, models the gain at roughly 0.5 percent of productivity over a decade. That number sits low partly by construction: his model explicitly rules out AI creating new kinds of jobs, which caps the upside it is able to find, and on reflection I don’t think it holds up as an especially strong study on its own. Acemoglu’s own framing of the figure is still worth keeping, if only as one data point among several: 0.5 percent over ten years is not nothing but is disappointing against the promises being made. Slok at Apollo notes that outside the seven biggest tech companies, there is no sign of AI in profit margins or earnings expectations at all. On the other side, the St. Louis Fed measured a 1.9 percent bump in cumulative productivity growth since ChatGPT launched, and the Peterson Institute argues the gains are real but invisible because our statistics cannot capture them yet.","And maybe that last point is the honest reconciliation. General purpose technologies take a long time to show up. Electricity and the internet each took 20 to 30 years to reshape productivity, because the gains require rewiring how work is organized, not just plugging in a new tool. We are about three years into this one. By that clock, we are still in the expensive infrastructure phase, not the payoff phase."]},{"title":"Conclusions","paragraphs":["So, is AI making us productive, or is it a luxury for burning credits? Here is what I think the evidence actually supports, stated as clearly as I can.","The task-level gains are real and well-documented. A consultant with GPT-4 finishes more work, faster, at higher quality. A developer with a coding assistant ships faster. A support agent with drafted replies closes tickets quicker. None of that is in dispute, and the controlled studies are consistent.","The workflow-level gains are real but narrower than advertised, and they show up in a specific accounting shape. In every honest case I found, from Klarna to Uber, AI did not delete the cost line. It bent the slope. Companies grew their volume while holding a labor-heavy cost line nearly flat. That is operating leverage, and it is genuinely valuable, but it is a quieter and slower thing than “we replaced our workforce.” The companies claiming clean headcount cuts, like Salesforce, turn out on inspection to be redeploying most of those people into revenue roles, and several of them have hit reliability walls that forced a partial retreat.","The profit-level and economy-level gains are mostly not here yet. Margins outside the biggest tech firms have not visibly moved. Aggregate productivity is, at best, up a percent or two, and serious economists put the durable number closer to half a percent over a decade. The 650 billion dollars in annual revenue that the infrastructure needs to justify itself is not in sight. If you are buying the AI bull case as a near-term margin story for ordinary companies, the data does not back you yet.","And yes, a large amount of the spend is closer to burning credits than to building value. The single biggest category of enterprise AI spend is engineers using coding tools, and the NANDA data suggests most internal AI projects produce no measurable return. A lot of what is happening under the banner of “AI transformation” is prototypes that never ship, pilots that never scale, and credits consumed in the name of looking modern. That failure mode is not a slander invented by skeptics. It is most of the long tail of the spend.","The thing that separates the 5 percent from the 95 percent is not which model you use. It is discipline. The winners bought rather than built, pointed the tool at one well-defined workflow with a measurable baseline, instrumented the result, and redeployed the time saved into something that actually generates output or revenue. The losers ran an open-ended pilot, never defined the outcome, and let the saved hours evaporate. The technology is a real lever. Whether it moves anything depends entirely on what you attach it to.","If you are building a company right now, the practical reading is simple. Treat AI as a way to grow without growing headcount in the same proportion, not as a magic cost eraser. Pick one painful, high-volume, measurable workflow and automate that, rather than spreading a thin layer of AI across everything. Buy the narrow tool before you build the general one. Measure the baseline before you deploy, or you will never know if it worked. And be deeply suspicious of any project where the saved time cannot be traced to either output or money, because that is the project that is quietly burning your credits.","The AI age really is everywhere. It just hasn’t reached the income statement yet, except in a few specific lines, for a few disciplined companies, who knew exactly what they were pointing it at."]},{"title":"Sources and notes","paragraphs":[],"list":["Menlo Ventures, “2025: The State of Generative AI in the Enterprise.” Enterprise AI spend figures, the 55 percent coding share, and the buy-versus-build shift.","Oxford Economics, “AI is reshaping the composition of enterprise tech spending in the US.” Sector-level AI spend and the 2030 projection.","Big Tech capex figures and the J.P. Morgan “650 billion in perpetuity” return analysis, as compiled in industry reporting (2025 to 2026).","Klarna Q1 2024 press release; CX Dive coverage of Klarna’s Q1 2025 and Q3 2025 earnings; Reuters and Bloomberg reporting on the May 2025 rehiring reversal.","Salesforce FY2025 results (Form 8-K, SEC); Benioff interview on The Logan Bartlett Show (Sept 2025) via CNBC, Fortune, and KTVU; later reporting on Agentforce reliability limits.","JPMorgan, Goldman Sachs, Morgan Stanley, and Bank of America AI productivity figures, as reported by CNBC, Training The Street, and InfoTech Lead, plus David Solomon and Jamie Dimon public statements.","Uber Technologies financial data drawn directly from its FY2025 annual report and quarterly filings (SEC); AI customer-support disclosure from its Q4 2024 earnings release.","NANDA (an MIT affiliate lab, not MIT faculty), “The GenAI Divide: State of AI in Business 2025,” via Fortune and Virtualization Review, including the 67 percent buy-versus-build success finding, and published critiques disputing the report’s methodology and findings.","Macro and productivity evidence: Apollo (Torsten Slok), Ivan Yotzov and Jose Maria Barrero, “Firm Data on AI” (NBER Working Paper), PwC CEO survey, the UK Department for Business and Trade Copilot trial, Daron Acemoglu’s productivity estimate, the St. Louis Fed adoption report, and the Peterson Institute policy brief, as reported by Fortune and Medium commentary (2025 to 2026)."],"note":"A note on confidence: the company-level numbers here come from earnings calls, SEC filings, and press releases, so they carry the usual self-serving bias of any company describing its own AI program. The SEC figures (Uber, Salesforce) are the most reliable; the podcast and press-release claims (Klarna’s agent counts, the banks’ productivity percentages) are directional and should be read as such."}],"outro":[]}</script>
